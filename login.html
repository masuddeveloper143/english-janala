<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <section id="hero-section" class="max-w-[1280px] mx-auto flex items-center justify-between mt-20">

        <div>

            <h1 class="text-4xl font-bold mb-4">
                <span class="text-sky-500">English</span> is Easy!!
            </h1>

            <p class="w-2/3 mb-6">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। Interactive Lessons আপনাকে নতুন Level এ নিয়ে যাবে।
            </p>

            <input value="masud" id="name-input" class="border p-2 w-60 mb-3" placeholder="Enter Your Name">

            <br>

            <input value="123456" id="password-input" type="password" class="border p-2 w-60 mb-3"
                placeholder="Enter Login Code (123456)">

            <br>

            <button id="login-btn" class="btn btn-primary">
                Get Started
            </button>

        </div>

        <div>
            <img class="w-[450px]" src="./assets/hero-student.png">
        </div>

    </section>

    <!-- footer  -->
    <footer class="border-t mt-24">

        <div class="max-w-[1280px] mx-auto flex justify-between py-10">

            <div>

                <div class="flex items-center gap-1 font-bold">

                    <span>English</span>
                    <img class="w-6" src="./assets/logo.png">
                    <span>জানালা</span>

                </div>

                <p class="mt-2">ইংরেজি শিখুন সহজে</p>

                <p class="text-sm opacity-70">
                    Providing ED-Tech Applications since 2025
                </p>

            </div>


            <div>

                <p class="font-semibold mb-2">Follow us</p>

                <div class="flex gap-4">

                    <a target="_blank" href="#">
                        <img src="./assets/fb-thumb.png">
                    </a>

                    <a target="_blank" href="#">
                        <img src="./assets/youtube-thumb.png">
                    </a>

                    <a target="_blank" href="#">
                        <img src="./assets/instagram-thumb.png">
                    </a>

                </div>

            </div>

        </div>

    </footer>
</body>

</html>
